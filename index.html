<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Фото Аналізатор</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Prevent theme flash on page load */
        body {
            background-color: #f4f4f4;
            color: #333;
        }
    </style>
    <script>
        // Apply saved theme before body renders
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            // Add style to prevent flash
            const style = document.createElement('style');
            style.textContent = 'body { background-color: #1e1e2f !important; color: #eee !important; }';
            document.head.appendChild(style);
        }
    </script>
</head>
<body>
    <div class="theme-toggle">
        <label for="theme-select">Тема:</label>
        <select id="theme-select">
            <option value="light">Світла</option>
            <option value="dark">Темна</option>
        </select>
    </div>

    <div class="container">
        <h1>Аналізатор тексту на фото</h1>
        <p>Перетягніть фото сюди, натисніть щоб вибрати файл, або вставте зображення з буфера (Ctrl+V).</p>
        <div id="user-info" class="user-info">
            <button id="login-btn">Увійти через Google</button>
            <span id="status-msg">(гість)</span>
            <div id="quota-msg" class="quota-msg"></div>
        </div>
        <div id="drop-zone" class="drop-zone">
            <p>Перетягніть фото тут</p>
            <p class="paste-hint">або вставте з буфера (Ctrl+V)</p>
            <input type="file" id="file-input" accept="image/*" multiple style="display: none;">
        </div>
        <div id="model-selection" class="model-selection">
            <div class="settings-row">
                <div>
                    <label for="model-select">Тип документа:</label>
                    <select id="model-select">
                        <option value="document" selected>Документ/Текст</option>
                        <option value="receipt">Квитанція/Чек</option>
                        <option value="handwriting">Рукопис</option>
                        <option value="quality">Низька якість</option>
                    </select>
                </div>
                <div>
                    <label for="language-select">Мова:</label>
                    <select id="language-select">
                        <option value="ukr+eng" selected>Українська + Англійська</option>
                        <option value="ukr">Лише українська</option>
                        <option value="eng">Лише англійська</option>
                        <option value="rus">Російська</option>
                    </select>
                </div>
            </div>
            <div class="settings-row">
                <label>
                    <input type="checkbox" id="enhance-checkbox" checked>
                    Посилене розпізнавання
                </label>
            </div>
        </div>

        <div id="result" class="result" style="display: none;">
            <h2>Результат аналізу:</h2>
            <textarea id="text-output" readonly></textarea>
            <button id="download-btn">Завантажити текстовий файл</button>
            <button id="clear-btn">Стерти текст</button>
        </div>
        <div id="loading" class="loading" style="display: none;">
            <p>Аналізую фото...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- For local testing, uses bundled app.js. For production (Vercel), uses modular js/main.js -->
    <script src="app.js"></script>
</body>
</html>
