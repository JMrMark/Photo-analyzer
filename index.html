<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Фото Аналізатор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="theme-toggle">
        <label for="theme-select">Тема:</label>
        <select id="theme-select">
            <option value="light">Світла</option>
            <option value="dark">Темна</option>
        </select>
    </div>

    <div class="container">
        <h1>Аналізатор тексту на фото</h1>
        <p>Перетягніть фото сюди або натисніть, щоб вибрати файл.</p>
        <div id="user-info" class="user-info">
            <button id="login-btn">Увійти через Google</button>
            <span id="status-msg">(гость)</span>
            <div id="quota-msg" class="quota-msg"></div>
        </div>
        <div id="drop-zone" class="drop-zone">
            <p>Перетягніть фото тут</p>
            <input type="file" id="file-input" accept="image/*" multiple style="display: none;">
        </div>
        <div id="model-selection" class="model-selection">
            <label for="model-select">Вибір моделі:</label>
            <select id="model-select">
                <option value="tesseract" selected>Tesseract</option>
                <option value="fast">Tesseract (швидкий режим)</option>
                <option value="custom">Кастомна модель</option>
            </select>
        </div>

        <div id="result" class="result" style="display: none;">
            <h2>Результат аналізу:</h2>
            <textarea id="text-output" readonly></textarea>
            <button id="download-btn">Завантажити текстовий файл</button>
            <button id="clear-btn">Стерти текст</button>
        </div>
        <div id="loading" class="loading" style="display: none;">
            <p>Аналізую фото...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
